name: CI Pipeline

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main
      - "release/**"

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      # تم التحديث إلى v4.2.2 أو v4 مباشرة لضمان استخدام أحدث سكريبت متوافق
      - name: Checkout code
        uses: actions/checkout@v4.2.2 

      - name: Run test
        run: npm start