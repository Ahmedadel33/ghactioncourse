name: CI Pipeline

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main
      - "release/**"

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # السطر ده هيطبع كل الملفات والفولدرات اللي عندك عشان نعرف المسار الصح
      - name: Debug - List all files
        run: ls -R

      - name: Run Bash Test Script
        run: bash src/test.sh